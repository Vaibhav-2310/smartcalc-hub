<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Free Age Calculator Online | Calculate Exact Age</title>

    <meta name="description"
        content="Free online age calculator to calculate exact age in years, months, days and next birthday countdown instantly.">

    <meta name="keywords"
        content="Age Calculator, DOB Calculator, Birthday Calculator">

    <meta name="author" content="Vaibhav">

    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#243b55">

    <meta property="og:title" content="Free Age Calculator Online">
    <meta property="og:description"
        content="Calculate your exact age instantly.">
    <meta property="og:type" content="website">
    <meta property="og:image" content="logo.png">

    <link rel="icon" type="image/png" href="logo.png">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="card">

            <h1>Age Calculator</h1>

            <h2 class="subtitle">
                Calculate Your Exact Age Online
            </h2>

            <p id="todayDate"></p>

            <p class="hint">
                Select your birth date and click Calculate Age
            </p>

            <div class="input-box">

                <input type="date" id="dob">

                <button onclick="calculateAge()">
                    Calculate Age
                </button>

                <button class="reset-btn" onclick="resetForm()">
                    Reset
                </button>

            </div>

            <div class="result">

                <h2 id="years">0 Years</h2>

                <p id="months">0 Months</p>

                <p id="days">0 Days</p>

                <br>

                <p id="totalDays">
                    Total Days Lived: 0
                </p>

                <p id="birthday">
                    Next Birthday In: 0 Days
                </p>

            </div>

        </div>

    </div>

    <footer>
        Made with ❤️ by Vaibhav
    </footer>

    <script src="script.js"></script>

</body>

</html>
